<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>銀河ERP - 憑證下載器</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Inline SVG Icons instead of external script to comply with Manifest V3 CSP -->
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-primary: #6366f1;
            --accent-hover: #4f46e5;
            --accent-glow: rgba(99, 102, 241, 0.25);
            --success-color: #10b981;
            --error-color: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            width: 320px;
            padding: 1.25rem;
            line-height: 1.5;
        }

        .header {
            margin-bottom: 1.25rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.75rem;
        }

        .header h2 {
            font-size: 1.15rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.15rem;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 0.75rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 0.35rem;
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
        }

        input {
            width: 100%;
            padding: 0.6rem 0.75rem;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: rgba(30, 41, 59, 0.5);
            color: var(--text-primary);
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .input-wrapper input {
            padding-right: 2.25rem;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .icon-btn {
            position: absolute;
            right: 8px;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .icon-btn:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
        }

        .btn {
            width: 100%;
            padding: 0.7rem;
            border: none;
            border-radius: 6px;
            background: var(--accent-primary);
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(99, 102, 241, 0.2);
            margin-top: 0.25rem;
        }

        .btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            background: rgba(99, 102, 241, 0.4);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn.loading {
            background: #d97706 !important;
            cursor: wait !important;
            box-shadow: 0 4px 10px rgba(217, 119, 6, 0.2) !important;
            opacity: 1 !important;
        }

        #status {
            margin-top: 1rem;
            font-size: 0.8rem;
            text-align: center;
            padding: 0.5rem;
            border-radius: 4px;
            display: none;
        }

        #status.info {
            display: block;
            background: rgba(56, 189, 248, 0.1);
            color: #38bdf8;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        #status.success {
            display: block;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success-color);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        #status.error {
            display: block;
            background: rgba(239, 68, 68, 0.1);
            color: var(--error-color);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>銀河ERP - 憑證下載助手</h2>
        <p>一鍵免簽密碼自動化下載台鐵乘車證明</p>
    </div>

    <div class="form-group">
        <label for="pid">身分證字號 / 統一編號</label>
        <div class="input-wrapper">
            <input type="password" id="pid" placeholder="例如：A123456789" value="" autocomplete="off">
            <button id="togglePidBtn" type="button" class="icon-btn" title="顯示/隱藏身分證">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
        </div>
    </div>

    <div class="form-group">
        <label for="recNo">訂票電腦代碼</label>
        <input type="text" id="recNo" placeholder="例如：9310417" value="" autocomplete="off">
    </div>

    <div class="form-group">
        <label for="filename">存檔名稱 (可自訂副檔名)</label>
        <input type="text" id="filename" placeholder="例如：TRA_Ticket_9310417.pdf" value="TRA_Ticket_代碼.pdf" autocomplete="off">
    </div>

    <button id="downloadBtn" class="btn">下載並重命名憑證</button>

    <div id="status"></div>

    <script src="popup.js"></script>
</body>
</html>
